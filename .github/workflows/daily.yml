name: AI Daily News Agent

on:
  schedule:
    - cron: "0 11 * * *"  # 6:00 AM EST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Commit output
        run: |
          git config --global user.name "ai-agent"
          git config --global user.email "ai@agent.com"
          git add output/
          git commit -m "Daily AI News Update" || echo "No changes"
          git push
